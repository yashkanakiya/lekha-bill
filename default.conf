server {
    listen 8000;
    server_name localhost;

    root /var/www/public;
    index index.php index.html;

    charset utf-8;

    # ✅ MAIN ROUTE
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ✅ PHP HANDLER (VERY IMPORTANT)
    location ~ \.php$ {
        include fastcgi_params;

        fastcgi_pass backend:9000;   # 🔥 use service name (NOT container_name)
        fastcgi_index index.php;

        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;

        # 🔥 FIX COOKIE ISSUE
        fastcgi_pass_header Set-Cookie;
        fastcgi_pass_header Cookie;

        # 🔥 SECURITY FIX
        fastcgi_param HTTP_PROXY "";
    }

    # ✅ DENY HIDDEN FILES
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # ✅ CORS (TEMP SAFE CONFIG FOR DEV)
    add_header Access-Control-Allow-Origin http://localhost:5173 always;
    add_header Access-Control-Allow-Credentials true always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, X-XSRF-TOKEN" always;

    # ✅ HANDLE PREFLIGHT REQUEST
    if ($request_method = OPTIONS) {
        return 204;
    }
}